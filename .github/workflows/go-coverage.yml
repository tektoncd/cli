name: Go coverage

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  go-coverage:
    name: Go coverage
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required to upload coverage to Codecov via OIDC

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Generate coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v 'github.com/tektoncd/cli/third_party/') || true
          echo "Generated coverage profile"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        continue-on-error: true # job still "succeeds" even if this step fails
        with:
          files: coverage.out
          flags: unit-tests
          use_oidc: true
          fail_ci_if_error: false
